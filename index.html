<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Untuk Jeya</title>
  <style>
    /* Reset & Base Style */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #fff5f5;
      color: #333;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
      overflow-x: hidden; /* Mencegah layar geser kanan-kiri di HP */
    }
    .container {
      background: white;
      padding: 30px 20px;
      border-radius: 20px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.05);
      max-width: 500px;
      width: 100%;
      text-align: center;
      position: relative;
    }

    /* Ucapan Awal */
    .sub-title {
      font-size: 1.1rem;
      color: #777;
      margin-bottom: 5px;
    }
    h1 {
      font-size: 1.6rem;
      color: #d63031;
      margin-bottom: 20px;
      line-height: 1.3;
    }
    .gif-img {
      width: 100%;
      max-width: 230px;
      border-radius: 15px;
      margin-bottom: 20px;
    }
    .surat {
      font-size: 0.95rem;
      line-height: 1.6;
      color: #555;
      margin-bottom: 35px; /* Ditambah biar ada space kosong sebelum tombol */
      text-align: justify;
    }

    /* Container Tombol Utama */
    .button-container {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 20px; /* Jarak aman antar tombol */
      min-height: 60px; /* Memastikan ada ruang buat tombol */
    }

    /* Styling Tombol */
    button {
      padding: 12px 25px;
      font-size: 1rem;
      font-weight: bold;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      transition: background-color 0.2s, transform 0.1s;
    }
    .btn-ya {
      background-color: #2ecc71;
      color: white;
    }
    .btn-ya:hover {
      background-color: #27ae60;
    }
    
    .btn-ga {
      background-color: #e74c3c;
      color: white;
      z-index: 999; /* Biar pas melayang ga ketutupan teks */
    }

    /* Halaman Sukses */
    .hidden {
      display: none;
    }
    .success-title {
      font-size: 1.8rem;
      color: #2ecc71;
      margin-bottom: 15px;
    }
  </style>
</head>
<body>

  <div class="container" id="konten-utama">
    <p class="sub-title">maaf ya jeya, i miss u sm :c</p>
    
    <img class="gif-img" src="https://media.giphy.com/media/7SF5scGB2AFrCQQw37/giphy.gif" alt="Sad Memelas">
    
    <h1>Maafin vael yaa, i know it's hurt but i still love you</h1>
    
    <p class="surat">
      haii.. maafin aku ya kalo aku banyak salahnya sama kamu maafin aku karena
